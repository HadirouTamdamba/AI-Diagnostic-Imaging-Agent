name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=term-missing

  security-audit:
    runs-on: ubuntu-latest
    # Advisory only: surfaces known CVEs in dependencies without blocking merges
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Audit dependencies (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t medical-imaging-agent:ci .

      - name: Smoke test container
        run: |
          docker run -d --name smoke -p 8501:8501 -e GOOGLE_API_KEY=dummy medical-imaging-agent:ci
          for i in $(seq 1 12); do
            if curl -sf http://localhost:8501/_stcore/health; then exit 0; fi
            sleep 5
          done
          docker logs smoke
          exit 1
